{% extends "base.html" %}

{% block title %}500 - Server Error{% endblock %}

{% block content %}
<div class="card" style="text-align: center; max-width: 600px; margin: 3rem auto;">
    <h1 style="font-size: 3rem; color: #dc3545;">500</h1>
    <h2>Server Error</h2>
    <p style="margin: 1rem 0; color: #666;">Something went wrong on our end. Please try again later.</p>
    <a href="{{ url_for('pages.index') }}" style="display: inline-block; margin-top: 1rem; padding: 0.75rem 1.5rem; background: #007bff; color: white; text-decoration: none; border-radius: 4px;">Go Home</a>
</div>
{% endblock %}
